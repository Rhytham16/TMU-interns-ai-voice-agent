<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budger - Real-Time AI Chat</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="sidebar">
    <div class="session-info">
      <h3>📊 Session Info</h3>
      <p><strong>Session:</strong> <span id="current-session">default</span></p>
      <p><strong>Status:</strong> <span id="connection-status">Disconnected</span></p>
      <p><strong>Messages:</strong> <span id="message-count">0</span></p>
    </div>
    <h3>💬 Chat History</h3>
    <div id="history"></div>
    <button onclick="clearHistory()">Clear History</button>
  </div>

  <div id="main-container">
    <h1 class="title">🤖 Budger AI Assistant</h1>
    <div class="status-indicator" id="status-indicator">🔴 Offline</div>
    <button id="startAgentBtn">Start Agent</button>

    <div id="chat-section" class="form-section" style="display:none">
      <div style="display:flex;gap:10px;margin-bottom:15px">
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
        </select>
        <select id="sessionSelect">
          <option value="default">Default Session</option>
          <option value="new">New Session</option>
        </select>
      </div>
      <input id="queryInput" placeholder="Ask something..." onkeypress="handleEnter(event)" />
      <div class="button-group" style="display: flex; gap: 10px;">
        <button id="mic-button" type="button" title="Start voice input">🎙️</button>
        <button onclick="sendQuery()">💬 Send</button>
        <button onclick="stopSpeaking()">⏹ Stop</button></div>
      <div id="transcript"></div>
      <div id="response"></div>
    </div>
  </div>

  <div id="right-panel">
    <div id="assistant-avatar">🧠</div>
    <h3 id="ai-status">Waiting...</h3>
  </div>

  <script>
    const API_BASE_URL = "http://127.0.0.1:8000";
    let currentSessionId = "default";
    let messageCount = 0;
    let websocket = null;
    let currentAIMessage = null;

    const elements = {
      queryInput: document.getElementById("queryInput"),
      responseBox: document.getElementById("response"),
      historyDiv: document.getElementById("history"),
      aiStatus: document.getElementById("ai-status"),
      avatar: document.getElementById("assistant-avatar"),
      languageSelect: document.getElementById("languageSelect"),
      sessionSelect: document.getElementById("sessionSelect"),
      statusIndicator: document.getElementById("status-indicator"),
      sessionIdDisplay: document.getElementById("current-session"),
      connectionStatus: document.getElementById("connection-status"),
      messageCount: document.getElementById("message-count"),
      chatSection: document.getElementById("chat-section"),
      startAgentBtn: document.getElementById("startAgentBtn")
    };

    elements.startAgentBtn.addEventListener("click", () => {
      elements.chatSection.style.display = "block";
      elements.startAgentBtn.style.display = "none";
      setupWebSocket();
    });

    function setupWebSocket() {
      const userId = localStorage.getItem("userId");
      websocket = new WebSocket(`ws://127.0.0.1:8000/ws/${currentSessionId}`);
      websocket.onopen = () => {
        elements.statusIndicator.textContent = "🟢 Online";
        elements.connectionStatus.textContent = "Connected";
        elements.aiStatus.textContent = "Ready to help";
      };
      websocket.onclose = () => {
        elements.statusIndicator.textContent = "🔴 Offline";
        elements.connectionStatus.textContent = "Disconnected";
        elements.aiStatus.textContent = "Disconnected";
      };
      websocket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.partial) {
          if (!currentAIMessage) {
            currentAIMessage = addMessageToHistory("", [], "ai");
          }
          currentAIMessage.querySelector("div:nth-child(2)").innerHTML = data.response;
        } else {
          if (!currentAIMessage) displayResponse(data);
          else {
            if (data.sources) {
              currentAIMessage.innerHTML += `<div class="sources">📚 Sources: ${data.sources.join(", ")}</div>`;
            }
            speakText(data.response);
            currentAIMessage = null;
          }
        }
      };
    }

    function sendQuery() {
      const query = elements.queryInput.value.trim();
      const userId = localStorage.getItem("userId");
      if (!query) return;
      addMessageToHistory(query, null, "user");
      elements.queryInput.value = "";
      speechSynthesis.cancel();
      if (websocket.readyState === WebSocket.OPEN) {
        websocket.send(JSON.stringify({
          query,
          session_id: currentSessionId,
          language: elements.languageSelect.value,
          user_id: userId
        }));
      }
    }

    function displayResponse(data) {
      if (data.response) {
        addMessageToHistory(data.response, data.sources, "ai");
        speakText(data.response);
      }
    }

    function addMessageToHistory(message, sources = [], type = "ai") {
      sources = sources || [];
      const div = document.createElement("div");
      div.className = `message ${type}-message`;
      let html = `<div><strong>${type === "user" ? "You" : "Budger AI"}:</strong>
        <span style="float:right;color:gray">${new Date().toLocaleTimeString()}</span></div>
        <div>${message}</div>`;
      if (sources.length)
        html += `<div class="sources">📚 Sources: ${sources.join(", ")}</div>`;
      div.innerHTML = html;
      elements.historyDiv.prepend(div);
      elements.messageCount.textContent = ++messageCount;
      return div;
    }

    function handleEnter(e) {
      if (e.key === "Enter") sendQuery();
    }

    function speakText(text) {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = /[\u0900-\u097F]/.test(text) ? "hi-IN" : "en-US";
      u.rate = 0.9;
      u.pitch = 1.0;
      u.volume = 1.0;
      speechSynthesis.speak(u);
    }

    function stopSpeaking() {
      if (speechSynthesis.speaking) speechSynthesis.cancel();
    }

    function clearHistory() {
      if (confirm("Clear chat history?")) {
        elements.historyDiv.innerHTML = "";
        messageCount = 0;
        elements.messageCount.textContent = "0";
        fetch(`${API_BASE_URL}/sessions/${currentSessionId}`, { method: "DELETE" });
      }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  alert("Speech Recognition not supported in this browser.");
} else {
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = true;
  recognition.interimResults = true;

  let recognizing = false;
  let finalTranscript = '';

  const micButton = document.getElementById('mic-button');
  const transcriptDiv = document.getElementById('transcript');

  micButton.addEventListener('click', () => {
    if (window.speechSynthesis.speaking) speechSynthesis.cancel();
    if (!recognizing) {
      recognition.start();
      micButton.classList.add('listening');
      recognizing = true;
      transcriptDiv.textContent = '';
    } else {
      recognition.stop();
      micButton.classList.remove('listening');
      recognizing = false;
    }
  });

  recognition.addEventListener('result', (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; ++i) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    transcriptDiv.textContent = finalTranscript + interim;
    if (finalTranscript) {
      addMessageToHistory(finalTranscript, null, "user");
      const userId = localStorage.getItem("userId");
      if (websocket && websocket.readyState === WebSocket.OPEN) {
        websocket.send(JSON.stringify({
          query: finalTranscript,
          session_id: currentSessionId,
          language: elements.languageSelect.value,
          user_id: userId
        }));
      }
      finalTranscript = '';
      recognition.stop();
      micButton.classList.remove('listening');
      recognizing = false;
    }
  });

  recognition.addEventListener('end', () => {
    recognizing = false;
    micButton.classList.remove('listening');
  });

  recognition.addEventListener('error', (e) => {
    console.error("Speech recognition error:", e.error);
    recognizing = false;
    micButton.classList.remove('listening');
  });
}

  </script>
</body>
</html>
